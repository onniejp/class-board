  <!-- Create Supabase client -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://ezqwfuisdirldwhfahja.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6cXdmdWlzZGlybGR3aGZhaGphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMjc2OTcsImV4cCI6MjA4NDYwMzY5N30.JoJdGH2D-w2ZJOJq13svswIUnIZehxwiThuj1YpuzkM";

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      alert("Set SUPABASE_URL and SUPABASE_ANON_KEY in index.html");
    }

    const statusEl = document.getElementById('conn-status');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.supabase = supabase;

    try {
      const { data, error } = await supabase.from('Tokens').select('id').limit(1);
      if (error) {
        statusEl.textContent = 'DB error: ' + error.message;
        console.error('DB error:', error);
      } else {
        statusEl.textContent = 'Connected';
      }
    } catch (e) {
      statusEl.textContent = 'Fatal error (see console)';
      console.error(e);
    }
  </script>
