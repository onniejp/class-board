<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Class Board (Prototype)</title>
  style.css
</head>
<body>
  <header class="topbar">
    <h1>Class Board</h1>
    <div class="status"><span id="conn-status">Connecting…</span></div>
  </header>

  <main>
    <div id="board" role="application" aria-label="Shared board"></div>
  </main>

  <!-- Load supabase-js and create a client -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "YOUR_SUPABASE_URL";        // e.g., https://abcxyz.supabase.co
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

    if (SUPABASE_URL.includes("YOUR_") || SUPABASE_ANON_KEY.includes("YOUR_")) {
      alert("Set SUPABASE_URL and SUPABASE_ANON_KEY in index.html");
    }

    // Make client available to app.js
    window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Optional quick ping: shows a helpful status if there is a DB error.
    try {
      const { data, error } = await window.supabase.from('Tokens').select('id').limit(1);
      if (error) {
        document.getElementById('conn-status').textContent = 'DB error: ' + error.message;
        console.error('DB error:', error);
      }
    } catch (e) {
      document.getElementById('conn-status').textContent = 'Fatal error (see console)';
      console.error(e);
    }
  </script>

  <!-- Your app code -->
  app.js</script>
</body>
</html>
