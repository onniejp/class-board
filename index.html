<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Class Board (Prototype)</title>

  <!-- Use a RELATIVE path so it works at /class-board/ on GitHub Pages -->
  style.css
</head>
<body>
  <header class="topbar">
    <h1>Class Board</h1>
    <div class="status"><span id="conn-status">Connecting…</span></div>
  </header>

  <main>
    <div id="board" role="application" aria-label="Shared board"></div>
  </main>

  <!-- Supabase client must run BEFORE app.js so window.supabase exists -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://ezqwfuisdirldwhfahja.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6cXdmdWlzZGlybGR3aGZhaGphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMjc2OTcsImV4cCI6MjA4NDYwMzY5N30.JoJdGH2D-w2ZJOJq13svswIUnIZehxwiThuj1YpuzkM";

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      alert("Set SUPABASE_URL and SUPABASE_ANON_KEY");
    }

    // Expose to app.js
    window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Optional: quick ping for feedback
    try {
      const el = document.getElementById('conn-status');
      const { error } = await window.supabase.from('Tokens').select('id').limit(1);
      el.textContent = error ? `DB error: ${error.message}` : 'Connected';
    } catch (e) {
      document.getElementById('conn-status').textContent = 'Fatal error (see console)';
      console.error(e);
    }
  </script>

  <!-- Your app code (RELATIVE path; no leading slash) -->
  app.js</script>
</body>
</html>
